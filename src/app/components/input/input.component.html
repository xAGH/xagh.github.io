<div
  class="w-full caret"
  #caret
  [ngClass]="caretShapeClass"
  (keydown.arrowleft)="logg('left')"
  (keydown.arrowright)="logg('')"
  >
    <input
    type="text"
    class="w-full outline-none bg-secondary text-primary caret-transparent"
    [formControl]="inputTextField"
    appAlwaysOnFocus
  />
</div>
